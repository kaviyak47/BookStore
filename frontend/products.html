<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Books</title>

<style>
body{
    margin:0;
    font-family:"Times New Roman", Times, serif;
    background:#f3e8ff;
    color:black;
}

.navbar{
    background:#d8b4fe;
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:30px;
    font-weight:bold;
}

.nav-links a{
    text-decoration:none;
    color:black;
    margin-left:25px;
    font-size:20px;
    font-weight:bold;
}

.container{
    padding:40px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:white;
    padding:25px;
    border-radius:18px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
    text-align:center;
}

.card img{
    width:120px;
    height:170px;
    object-fit:cover;
    border-radius:10px;
    margin-bottom:10px;
}

button{
    background:#d8b4fe;
    border:none;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">📚 Kaviya's BookStore</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Books</a>
        <a href="cart.html">Cart</a>
        <a href="orders.html">Orders</a>
    </div>
</div>

<div class="container">
    <h2>📖 Available Books</h2>
    <div class="grid" id="list"></div>
</div>

<script>

const API = "https://jxjo2t0ulj.execute-api.ap-southeast-1.amazonaws.com/S1";

let products = [];

/* AUTHOR MAP */
const authorMap = {
    "The Alchemist": "Paulo Coelho",
    "Atomic Habits": "James Clear",
    "Clean Code": "Robert C. Martin",
    "Deep Work": "Cal Newport"
};

/* IMAGE MAP */
const imageMap = {
    "The Alchemist": "https://kaviya-bookstore-frontend.s3.ap-southeast-1.amazonaws.com/images/alchemist.jpg",
    "Atomic Habits": "https://kaviya-bookstore-frontend.s3.ap-southeast-1.amazonaws.com/images/atomic-habits.webp",
    "Clean Code": "https://kaviya-bookstore-frontend.s3.ap-southeast-1.amazonaws.com/images/clean-code.webp",
    "Deep Work": "https://kaviya-bookstore-frontend.s3.ap-southeast-1.amazonaws.com/images/deep-work.webp"
};

async function loadProducts(){
    const res = await fetch(`${API}/products`);
    products = await res.json();

    let html = "";

    products.forEach((p,i)=>{
        html += `
        <div class="card">
            <img src="${imageMap[p.title]}" alt="${p.title}">
            <h3>${p.title}</h3>
            <p><i>by ${authorMap[p.title]}</i></p>
            <p><b>₹${p.price}</b></p>
            <button onclick="addToCart(${i})">Add to Cart</button>
        </div>`;
    });

    document.getElementById("list").innerHTML = html;
}

async function addToCart(index){

    const product = products[index];

    const payload = {
        user_id: 1,
        product_id: product.id,
        title: product.title,
        price: product.price,
        qty: 1
    };

    const res = await fetch(`${API}/cart`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
    });

    const data = await res.json();
    alert(data.message);
}

loadProducts();

</script>

</body>
</html>
