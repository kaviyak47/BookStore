<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Books</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:"Times New Roman", Times, serif;
    background:#f3e8ff;
    color:black;
}

.navbar{
    background:#d8b4fe;
    padding:18px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:15px;
}

.logo{
    font-size:30px;
    font-weight:bold;
}

.nav-links{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
}

.nav-links a,
.nav-links span{
    background:white;
    color:black;
    text-decoration:none;
    border-radius:50%;
    width:45px;
    height:45px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    transition:0.2s;
}

.nav-links i{
    font-size:18px;
}

.nav-links a:hover{
    transform:scale(1.1);
    background:#ede9fe;
}

#user-info{
    border-radius:20px;
    padding:6px 14px;
    width:auto;
    height:auto;
    font-size:15px;
    cursor:default;
}

.container{
    padding:40px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:white;
    padding:25px;
    border-radius:18px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
    text-align:center;
}

.card img{
    width:120px;
    height:170px;
    object-fit:cover;
    border-radius:10px;
    margin-bottom:10px;
}

button{
    background:#d8b4fe;
    border:none;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
    margin-top:10px;
    font-family:"Times New Roman", Times, serif;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">📚 Kaviya's BookStore</div>
    <div class="nav-links">
        <a href="index.html" title="Home"><i class="fa-solid fa-house"></i></a>
        <a href="products.html" title="Books"><i class="fa-solid fa-book"></i></a>
        <a href="cart.html" title="Cart"><i class="fa-solid fa-cart-shopping"></i></a>
        <a href="orders.html" title="Orders"><i class="fa-solid fa-box"></i></a>
        <a href="profile.html" title="Profile"><i class="fa-solid fa-user"></i></a>
        <span id="user-info"></span>
        <a href="javascript:void(0)" onclick="logout()" title="Logout">
            <i class="fa-solid fa-right-from-bracket"></i>
        </a>
    </div>
</div>

<div class="container">
    <h2>📖 Available Books</h2>
    <div class="grid" id="list"></div>
</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
    alert("Please login first");
    window.location.href = "login.html";
}

document.getElementById("user-info").innerText = `Hi, ${user.name}`;

const API = "https://jxjo2t0ulj.execute-api.ap-southeast-1.amazonaws.com/S1";

let products = [];

const authorMap = {
    "The Alchemist": "Paulo Coelho",
    "Atomic Habits": "James Clear",
    "Clean Code": "Robert C. Martin",
    "Deep Work": "Cal Newport"
};

const imageMap = {
    "The Alchemist": "https://kaviya-bookstore-frontend.s3.ap-southeast-1.amazonaws.com/images/alchemist.jpg",
    "Atomic Habits": "https://kaviya-bookstore-frontend.s3.ap-southeast-1.amazonaws.com/images/atomic-habits.webp",
    "Clean Code": "https://kaviya-bookstore-frontend.s3.ap-southeast-1.amazonaws.com/images/clean-code.webp",
    "Deep Work": "https://kaviya-bookstore-frontend.s3.ap-southeast-1.amazonaws.com/images/deep-work.webp"
};

function logout() {
    localStorage.removeItem("user");
    window.location.href = "login.html";
}

async function loadProducts(){
    try{
        const res = await fetch(`${API}/products`);
        const data = await res.json();

        if (!res.ok) {
            alert(data.message || "Failed to load products");
            return;
        }

        products = Array.isArray(data) ? data : [];

        let html = "";

        products.forEach((p, i) => {
            html += `
            <div class="card">
                <img src="${imageMap[p.title] || ''}" alt="${p.title}">
                <h3>${p.title}</h3>
                <p><i>by ${authorMap[p.title] || "Unknown Author"}</i></p>
                <p><b>₹${p.price}</b></p>
                <button onclick="addToCart(${i})">Add to Cart</button>
            </div>`;
        });

        document.getElementById("list").innerHTML = html;
    } catch(err){
        console.error("Load products error:", err);
        alert("API error while loading products");
    }
}

async function addToCart(index){
    const product = products[index];

    const payload = {
        user_id: user.email,
        product_id: product.id,
        title: product.title,
        price: product.price,
        qty: 1
    };

    try{
        const res = await fetch(`${API}/cart`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
            alert(data.error || data.message || "Failed to add to cart");
            return;
        }

        alert(data.message || "Added to cart");
    } catch(err){
        console.error("Add to cart error:", err);
        alert("API error while adding to cart");
    }
}

loadProducts();
</script>

</body>
</html>
