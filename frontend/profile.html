<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:"Times New Roman", Times, serif;
    background:#f3e8ff;
    color:black;
}

.navbar{
    background:#d8b4fe;
    padding:18px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:15px;
}

.logo{
    font-size:30px;
    font-weight:bold;
}

.nav-links{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
}

.nav-links a,
.nav-links span{
    background:white;
    color:black;
    text-decoration:none;
    border-radius:50%;
    width:45px;
    height:45px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    transition:0.2s;
}

.nav-links i{
    font-size:18px;
}

.nav-links a:hover{
    transform:scale(1.1);
    background:#ede9fe;
}

#user-info{
    border-radius:20px;
    padding:6px 14px;
    width:auto;
    height:auto;
    font-size:15px;
    cursor:default;
}

.container{
    padding:40px;
    display:flex;
    justify-content:center;
}

.profile-card{
    background:white;
    width:100%;
    max-width:500px;
    padding:30px;
    border-radius:18px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.profile-card h2{
    margin-top:0;
    text-align:center;
    margin-bottom:25px;
}

.profile-row{
    background:#faf5ff;
    padding:14px 18px;
    border-radius:12px;
    margin-bottom:15px;
    font-size:20px;
}

.label{
    font-weight:bold;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">📚 Kaviya's BookStore</div>
    <div class="nav-links">
        <a href="index.html" title="Home"><i class="fa-solid fa-house"></i></a>
        <a href="products.html" title="Books"><i class="fa-solid fa-book"></i></a>
        <a href="cart.html" title="Cart"><i class="fa-solid fa-cart-shopping"></i></a>
        <a href="orders.html" title="Orders"><i class="fa-solid fa-box"></i></a>
        <a href="profile.html" title="Profile"><i class="fa-solid fa-user"></i></a>
        <span id="user-info"></span>
        <a href="javascript:void(0)" onclick="logout()" title="Logout">
            <i class="fa-solid fa-right-from-bracket"></i>
        </a>
    </div>
</div>

<div class="container">
    <div class="profile-card">
        <h2>👤 My Profile</h2>

        <div class="profile-row">
            <span class="label">Name:</span>
            <span id="name"></span>
        </div>

        <div class="profile-row">
            <span class="label">Email:</span>
            <span id="email"></span>
        </div>

        <div class="profile-row">
            <span class="label">Role:</span>
            <span id="role"></span>
        </div>
    </div>
</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
    alert("Please login first");
    window.location.href = "login.html";
}

document.getElementById("user-info").innerText = `Hi, ${user.name || "User"}`;
document.getElementById("name").innerText = user.name || "-";
document.getElementById("email").innerText = user.email || "-";
document.getElementById("role").innerText = user.role || "-";

function logout() {
    localStorage.removeItem("user");
    window.location.href = "login.html";
}
</script>

</body>
</html>
