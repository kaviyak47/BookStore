<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaviya's BookStore</title>

<!-- Font Awesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:"Times New Roman", Times, serif;
    background:#f3e8ff;
    color:black;
}

.navbar{
    background:#d8b4fe;
    padding:18px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:15px;
}

.logo{
    font-size:30px;
    font-weight:bold;
}

/* NAVBAR ICON STYLE */
.nav-links{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
}

.nav-links a,
.nav-links span{
    background:white;
    color:black;
    text-decoration:none;
    border-radius:50%;
    width:45px;
    height:45px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    transition:0.2s;
}

/* icon size */
.nav-links i{
    font-size:18px;
}

/* hover effect */
.nav-links a:hover{
    transform:scale(1.1);
    background:#ede9fe;
}

/* username */
#user-info{
    border-radius:20px;
    padding:6px 14px;
    width:auto;
    height:auto;
    font-size:15px;
    cursor:default;
}

/* CONTENT */
.container{
    text-align:center;
    padding:120px 20px 0 20px;
}

h1{
    font-size:52px;
    margin-bottom:10px;
}

h2{
    font-size:32px;
    margin-bottom:30px;
}

button{
    background:#d8b4fe;
    color:black;
    border:none;
    padding:14px 28px;
    border-radius:12px;
    font-size:20px;
    cursor:pointer;
    font-family:"Times New Roman", Times, serif;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">📚 Kaviya's BookStore</div>
    <div class="nav-links" id="nav-links"></div>
</div>

<div class="container">
    <h1>Kaviya's BookStore</h1>
    <h2>Welcome To Your Online Bookstore</h2>
    <button onclick="goToBooks()">View Books</button>
</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));
const nav = document.getElementById("nav-links");

if (user) {
    nav.innerHTML = `
        <a href="index.html" title="Home"><i class="fa-solid fa-house"></i></a>
        <a href="products.html" title="Books"><i class="fa-solid fa-book"></i></a>
        <a href="cart.html" title="Cart"><i class="fa-solid fa-cart-shopping"></i></a>
        <a href="orders.html" title="Orders"><i class="fa-solid fa-box"></i></a>
        <a href="profile.html" title="Profile"><i class="fa-solid fa-user"></i></a>
        <span id="user-info">Hi, ${user.name}</span>
        <a href="javascript:void(0)" onclick="logout()" title="Logout">
            <i class="fa-solid fa-right-from-bracket"></i>
        </a>
    `;
} else {
    nav.innerHTML = `
        <a href="index.html" title="Home"><i class="fa-solid fa-house"></i></a>
        <a href="products.html" title="Books"><i class="fa-solid fa-book"></i></a>
        <a href="cart.html" title="Cart"><i class="fa-solid fa-cart-shopping"></i></a>
        <a href="orders.html" title="Orders"><i class="fa-solid fa-box"></i></a>
        <a href="login.html" title="Login"><i class="fa-solid fa-right-to-bracket"></i></a>
        <a href="signup.html" title="Signup"><i class="fa-solid fa-user-plus"></i></a>
    `;
}

function logout(){
    localStorage.removeItem("user");
    window.location.href = "login.html";
}

function goToBooks(){
    if(user){
        window.location.href = "products.html";
    } else {
        alert("Please login first");
        window.location.href = "login.html";
    }
}
</script>

</body>
</html>
