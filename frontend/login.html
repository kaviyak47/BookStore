
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
    margin:0;
    font-family:"Times New Roman", Times, serif;
    background:#f3e8ff;
    color:black;
}

.navbar{
    background:#d8b4fe;
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:30px;
    font-weight:bold;
}

.nav-links a{
    text-decoration:none;
    color:black;
    margin-left:25px;
    font-size:20px;
    font-weight:bold;
}

.container{
    padding:40px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:white;
    padding:35px;
    border-radius:18px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
    width:100%;
    max-width:420px;
}

.card h2{
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:16px;
    border:1px solid #d1d5db;
    border-radius:10px;
    font-size:17px;
    font-family:"Times New Roman", Times, serif;
    box-sizing:border-box;
}

button{
    background:#d8b4fe;
    border:none;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
    margin-top:10px;
    width:100%;
    font-family:"Times New Roman", Times, serif;
}

button:hover{
    background:#c084fc;
}

.bottom-text{
    text-align:center;
    margin-top:18px;
    font-size:18px;
}

.bottom-text a{
    text-decoration:none;
    color:black;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">📚 Kaviya's BookStore</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Books</a>
        <a href="signup.html">Signup</a>
    </div>
</div>

<div class="container">
    <div class="card">
        <h2>🔐 Login</h2>

        <input type="email" id="email" placeholder="Enter your email">
        <input type="password" id="password" placeholder="Enter your password">

        <button onclick="login()">Login</button>

        <div class="bottom-text">
            New user? <a href="signup.html">Create account</a>
        </div>
    </div>
</div>

<script>
const AUTH_API = "https://iyueqkeyjh.execute-api.ap-southeast-1.amazonaws.com/dev";

async function login() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
        alert("Please enter email and password");
        return;
    }

    try {
        const res = await fetch(`${AUTH_API}/login`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email,
                password: password
            })
        });

        const data = await res.json();
        console.log("LOGIN RESPONSE:", data);

        if (!res.ok) {
            alert(data.message || "Login failed");
            return;
        }

        if (!data.user) {
            alert("Login response missing user data");
            return;
        }

        if (!data.token) {
            alert("Login successful, but token missing. Check Auth Lambda code.");
            return;
        }

        const loggedUser = {
            email: data.user.email,
            name: data.user.name,
            role: data.user.role || "customer"
        };

        localStorage.removeItem("user");
        localStorage.removeItem("token");

        localStorage.setItem("user", JSON.stringify(loggedUser));
        localStorage.setItem("token", data.token);

        console.log("SAVED USER:", localStorage.getItem("user"));
        console.log("SAVED TOKEN:", localStorage.getItem("token"));

        alert("Login successful");
        window.location.href = "products.html";

    } catch (err) {
        console.error("Login error:", err);
        alert("API error while logging in");
    }
}
</script>

</body>
</html>
